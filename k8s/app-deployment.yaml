apiVersion: apps/v1
kind: Deployment
metadata:
  name: namegen
  namespace: namegen
spec:
  replicas: 2

  strategy:
    type: RollingUpdate

  selector:
    matchLabels:
      app: namegen

  template:
    metadata:
      labels:
        app: namegen
    spec:
      containers:
        - name: namegen
          image: 771650096212.dkr.ecr.eu-central-1.amazonaws.com/namegen:initial
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080

          env:
            - name: SERVER_PORT
              value: "8080"

            - name: MONGODB_URL
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGODB_URL

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20